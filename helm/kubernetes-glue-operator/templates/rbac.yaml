{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "glue-operator.fullname" . }}-manager
  labels:
    {{- include "glue-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - io.javaoperatorsdk.operator.glue
    resources:
      - glues
      - glues/status
      - glues/finalizers
      - glueoperators
      - glueoperators/status
      - glueoperators/finalizers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # The operator validates its CRDs against the cluster on startup.
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
  {{- with .Values.rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "glue-operator.fullname" . }}-manager
  labels:
    {{- include "glue-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "glue-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "glue-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.rbac.allAccess }}
---
# A Glue can manage arbitrary resource types, so the operator needs broad access.
# Disable with rbac.allAccess=false and grant scoped rules via rbac.extraRules.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "glue-operator.fullname" . }}-all-access
  labels:
    {{- include "glue-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "glue-operator.fullname" . }}-all-access
  labels:
    {{- include "glue-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "glue-operator.fullname" . }}-all-access
subjects:
  - kind: ServiceAccount
    name: {{ include "glue-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.rbac.bindView }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "glue-operator.fullname" . }}-view
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glue-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: {{ include "glue-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
